    <div class="recipe-content">
        <h1>Pancakes</h1>

        <div class="recipe-meta">
            <span>⏱ 20 mins</span>
            <span>🔥 Easy</span>
        </div>

        <h2>Ingredients</h2>
        <ul>
            <li>1 cup flour</li>
            <li>1 cup milk</li>
            <li>1 egg</li>
            <li>2 tbsp sugar</li>
            <li>Butter</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Mix flour, milk, egg and sugar</li>
            <li>Heat pan and add butter</li>
            <li>Pour batter and cook both sides</li>
            <li>Serve with syrup or chocolate</li>
        </ol>

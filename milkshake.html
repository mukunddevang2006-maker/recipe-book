<div class="recipe-detail">

    <div class="recipe-content">
        <h1>Chocolate Milkshake</h1>

        <div class="recipe-meta">
            <span>⏱ 15 mins</span>
            <span>🔥 Easy</span>
        </div>

        <h2>Ingredients</h2>
        <ul>
            <li>1 cup milk</li>
            <li>2 scoops chocolate ice cream</li>
            <li>Chocolate syrup</li>
            <li>Ice cubes</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add all ingredients to blender</li>
            <li>Blend until creamy</li>
            <li>Pour into glass</li>
            <li>Top with chocolate syrup</li>
        </ol>

    </div>

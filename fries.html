        <h1>French Fries</h1>

        <div class="recipe-meta">
            <span>⏱ 30 mins</span>
            <span>🔥 Medium</span>
        </div>

        <h2>Ingredients</h2>
        <ul>
            <li>Potatoes</li>
            <li>Salt</li>
            <li>Oil for frying</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Cut potatoes into strips</li>
            <li>Soak in water for 15 mins</li>
            <li>Deep fry until golden</li>
            <li>Add salt and serve hot</li>
        </ol>

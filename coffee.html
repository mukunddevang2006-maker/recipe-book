<div class="recipe-detail">

    <div class="recipe-content">
        <h1>Cold Coffee</h1>

        <div class="recipe-meta">
            <span>⏱ 10 mins</span>
            <span>🔥 Easy</span>
        </div>

        <h2>Ingredients</h2>
        <ul>
            <li>1 cup milk</li>
            <li>1 tbsp coffee powder</li>
            <li>2 tbsp sugar</li>
            <li>Ice cubes</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add milk, coffee, and sugar to blender</li>
            <li>Add ice cubes</li>
            <li>Blend until smooth</li>
            <li>Serve chilled</li>
        </ol>

    </div>

</div>
